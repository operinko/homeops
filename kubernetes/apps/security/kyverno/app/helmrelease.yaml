---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: security
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: kyverno
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    crds:
      install: true
    admissionController:
      replicas: 1
    backgroundController:
      replicas: 1
    cleanupController:
      replicas: 1
    reportsController:
      replicas: 1
