---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: network
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: traefik
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    gateway:
      enabled: false
    gatewayClass:
      enabled: false
    deployment:
      priorityClassName: system-cluster-critical
      replicas: 4
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: 2
          maxUnavailable: 0
      podAnnotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
      initContainers:
        - name: plugin-loader
          image: alpine:3.21
          command: ["sh", "-c"]
          args:
            - |
              set -e
              # renovate: datasource=github-releases depName=xabinapal/traefik-authentik-forward-plugin
              AUTH_VER=v1.0.0
              # renovate: datasource=github-releases depName=l4rm4nd/traefik-warp
              WARP_VER=v1.1.5
              AUTH_DIR=/plugins-local/src/github.com/xabinapal/traefik-authentik-forward-plugin
              WARP_DIR=/plugins-local/src/github.com/l4rm4nd/traefik-warp
              mkdir -p "$AUTH_DIR"
              wget -qO- "https://github.com/xabinapal/traefik-authentik-forward-plugin/archive/${AUTH_VER}.tar.gz" \
                | tar xz -C "$AUTH_DIR" --strip-components=1
              mkdir -p "$WARP_DIR"
              wget -qO- "https://github.com/l4rm4nd/traefik-warp/archive/${WARP_VER}.tar.gz" \
                | tar xz -C "$WARP_DIR" --strip-components=1
          volumeMounts:
            - name: plugins-local
              mountPath: /plugins-local
      additionalVolumes:
        - name: plugins-local
          emptyDir: {}
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 1000m
        memory: 512Mi
    additionalVolumeMounts:
      - name: plugins-local
        mountPath: /plugins-local
    additionalArguments:
      - --api.insecure=true
      - --api.dashboard=true
      - --serversTransport.maxIdleConnsPerHost=100
      - --entryPoints.websecure.transport.respondingTimeouts.readTimeout=60s
      - --entryPoints.websecure.transport.respondingTimeouts.writeTimeout=60s
      - --entryPoints.websecure.transport.respondingTimeouts.idleTimeout=180s

    providers:
      kubernetesIngress:
        enabled: false
        namespaces: []
      kubernetesGateway:
        enabled: true
      kubernetesCRD:
        enabled: true
    api:
      dashboard: true
      insecure: true
    logs:
      general:
        level: INFO
      access:
        enabled: true
        format: json
        fields:
          defaultMode: keep
          names:
            ClientUsername: drop
          headers:
            defaultMode: keep
            names:
              Authorization: drop
              User-Agent: keep
              CF-Connecting-IP: keep
              X-Forwarded-For: keep
              X-Real-IP: keep
              X-Forwarded-Host: keep
              X-Forwarded-Port: keep
              X-Forwarded-Proto: keep
    experimental:
      localPlugins:
        authentik-forward:
          moduleName: "github.com/xabinapal/traefik-authentik-forward-plugin"
        traefikwarp:
          moduleName: "github.com/l4rm4nd/traefik-warp"
    service:
      enabled: true
      type: LoadBalancer
      labels:
        io.cilium/ipam: static
      annotations:
        lbipam.cilium.io/ips: "192.168.7.4"
      externalTrafficPolicy: Local
    ports:
      web:
        port: 80
      websecure:
        port: 443
        http3:
          enabled: true
      traefik:
        port: 9000
        expose:
          default: true
        exposedPort: 9000
