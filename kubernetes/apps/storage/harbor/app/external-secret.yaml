---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-secret
  namespace: storage
spec:
  refreshInterval: 1h
  target:
    name: harbor-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        # Sensitive Helm values (injected via valuesFrom in HelmRelease)
        values.yaml: |
          harborAdminPassword: "{{ .admin_password }}"
          secretKey: "{{ .harbor_secret_key }}"
          registry:
            secret: "{{ .registry_http_secret }}"
          database:
            external:
              username: "{{ .postgres_user }}"
              password: "{{ .postgres_password }}"
              coreDatabase: "{{ .postgres_user }}"
          redis:
            external:
              password: "{{ .redis_password }}"
          persistence:
            imageChartStorage:
              s3:
                accesskey: "{{ .aws_access_key }}"
                secretkey: "{{ .aws_secret_key }}"
                bucket: "{{ .aws_bucket }}"
        # postgres-init variables (for init Job)
        INIT_POSTGRES_HOST: "postgres17-rw.database.svc.cluster.local."
        INIT_POSTGRES_SUPER_USER: "{{ .super_user }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .super_password }}"
        INIT_POSTGRES_USER: "{{ .postgres_user }}"
        INIT_POSTGRES_PASS: "{{ .postgres_password }}"
        INIT_POSTGRES_DBNAME: "{{ .postgres_user }}"
  data:
    # Harbor admin password (login credentials on the Vaultwarden item)
    - secretKey: admin_password
      sourceRef:
        storeRef:
          name: bitwarden-login
          kind: ClusterSecretStore
      remoteRef:
        key: 84fb75c3-a5fd-4c28-97d3-ca0a4d240ef5
        property: password
    # Postgres credentials for Harbor
    - secretKey: postgres_user
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: 84fb75c3-a5fd-4c28-97d3-ca0a4d240ef5
        property: postgres_user
    - secretKey: postgres_password
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: 84fb75c3-a5fd-4c28-97d3-ca0a4d240ef5
        property: postgres_password
    # Harbor secrets
    - secretKey: harbor_secret_key
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: 84fb75c3-a5fd-4c28-97d3-ca0a4d240ef5
        property: harbor_secret_key
    - secretKey: registry_http_secret
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: 84fb75c3-a5fd-4c28-97d3-ca0a4d240ef5
        property: registry_http_secret
    # MinIO S3 credentials
    - secretKey: aws_access_key
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: 84fb75c3-a5fd-4c28-97d3-ca0a4d240ef5
        property: aws_access_key
    - secretKey: aws_secret_key
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: 84fb75c3-a5fd-4c28-97d3-ca0a4d240ef5
        property: aws_secret_key
    - secretKey: aws_bucket
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: 84fb75c3-a5fd-4c28-97d3-ca0a4d240ef5
        property: aws_bucket
    # Postgres superuser (for init Job)
    - secretKey: super_user
      sourceRef:
        storeRef:
          name: bitwarden-login
          kind: ClusterSecretStore
      remoteRef:
        key: ed32aa71-d74b-43bc-a467-aaa2569f532f
        property: username
    - secretKey: super_password
      sourceRef:
        storeRef:
          name: bitwarden-login
          kind: ClusterSecretStore
      remoteRef:
        key: ed32aa71-d74b-43bc-a467-aaa2569f532f
        property: password
    # Dragonfly/Redis password
    - secretKey: redis_password
      sourceRef:
        storeRef:
          name: bitwarden-login
          kind: ClusterSecretStore
      remoteRef:
        key: 00bfab9a-6bcf-4598-aaf6-2a65746691db
        property: password
