---
apiVersion: batch/v1
kind: Job
metadata:
  name: harbor-config
  namespace: storage
spec:
  template:
    spec:
      containers:
        - name: configure
          image: docker.io/curlimages/curl:8.18.0@sha256:d94d07ba9e7d6de898b6d96c1a072f6f8266c687af78a74f380087a0addf5d17
          command: ["/bin/sh", "/scripts/configure.sh"]
          env:
            - name: HARBOR_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: harbor-secret
                  key: HARBOR_ADMIN_PASSWORD
            - name: HARBOR_ROBOT_SECRET
              valueFrom:
                secretKeyRef:
                  name: harbor-secret
                  key: HARBOR_ROBOT_SECRET
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: scripts
          configMap:
            name: harbor-config-script
            defaultMode: 0755
      restartPolicy: OnFailure
  backoffLimit: 6
