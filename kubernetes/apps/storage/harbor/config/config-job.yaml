---
apiVersion: batch/v1
kind: Job
metadata:
  name: harbor-config
  namespace: storage
spec:
  template:
    spec:
      containers:
        - name: configure
          image: docker.io/curlimages/curl:8.19.0@sha256:b066cbf876d50a5d024927878a586c4a39c985325ded195e2e231f4abdddf3c8
          command: ["/bin/sh", "/scripts/configure.sh"]
          env:
            - name: HARBOR_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: harbor-secret
                  key: HARBOR_ADMIN_PASSWORD
            - name: HARBOR_ROBOT_SECRET
              valueFrom:
                secretKeyRef:
                  name: harbor-secret
                  key: HARBOR_ROBOT_SECRET
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: scripts
          configMap:
            name: harbor-config-script
            defaultMode: 0755
      restartPolicy: OnFailure
  backoffLimit: 6
