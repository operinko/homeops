---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bambuddy
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: bambuddy
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    controllers:
      bambuddy:
        containers:
          app:
            image:
              repository: ghcr.io/maziggy/bambuddy
              tag: 0.2.3.2@sha256:debbfe09b1cf73e53440bafed67750c961ea07b761b1c6c1fe40c1bf9bfdd77f
            env:
              TZ: Europe/Helsinki
              PORT: &port 8000
              VIRTUAL_PRINTER_PASV_ADDRESS: "192.168.7.12"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - python3
                      - -c
                      - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - python3
                      - -c
                      - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                add: ["NET_BIND_SERVICE"]
                drop: ["ALL"]
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi

    defaultPodOptions:
      annotations:
        k8s.v1.cni.cncf.io/networks: |-
          [{"name":"bambuddy-ipvlan","namespace":"tools"}]
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: {type: RuntimeDefault}

    service:
      app:
        controller: bambuddy
        ports:
          http:
            port: *port
    persistence:
      data:
        existingClaim: bambuddy
        globalMounts:
          - path: /app/data
            subPath: data
          - path: /app/logs
            subPath: logs
