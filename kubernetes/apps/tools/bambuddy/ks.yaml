---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: bambuddy
  namespace: flux-system
spec:
  decryption:
    provider: sops
  targetNamespace: tools
  commonMetadata:
    labels:
      app.kubernetes.io/name: bambuddy
  path: "./kubernetes/apps/tools/bambuddy/app"
  prune: true
  dependsOn:
    - name: volsync
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false # Default false for speed, enable for critical
  components:
    - ../../../../components/volsync-kopia
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  postBuild:
    substitute:
      APP: bambuddy
      VOLSYNC_COPYMETHOD: Direct
      VOLSYNC_CAPACITY: 20Gi
      VOLSYNC_STORAGECLASS: local-path
      VOLSYNC_PUID: "1000"
      VOLSYNC_PGID: "1000"
