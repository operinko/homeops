---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tainer
  namespace: flux-system
spec:
  decryption:
    provider: sops
  targetNamespace: tools
  commonMetadata:
    labels:
      app.kubernetes.io/name: tainer
  path: "./kubernetes/apps/tools/tainer/app"
  prune: true
  dependsOn:
    - name: volsync
      namespace: storage
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  components:
    - ../../../../components/volsync-kopia
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  postBuild:
    substitute:
      APP: tainer
      VOLSYNC_COPYMETHOD: Direct
      VOLSYNC_CAPACITY: 5Gi
      VOLSYNC_STORAGECLASS: local-path
      VOLSYNC_PUID: "0"
      VOLSYNC_PGID: "0"
